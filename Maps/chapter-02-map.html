<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Apostolic Imprint — Maps</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="../css/map-core.css?v=3">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="../js/map-helpers.js"></script>
</head>
<body>

<div id="root">
  <div class="rail">
    <div class="rail-head">
      <div class="masthead">
        <div class="masthead-mark">I</div>
        <div class="masthead-name">St. Thomas Tradition</div>
      </div>
      <div class="chapter-eyebrow">Chapter 02 Maps</div>
      <div class="chapter-title">The Apostolic Imprint</div>
    </div>
    <div class="layer-nav">
      <button class="layer-row" data-tab="gondophares">
        <div class="layer-num">01</div>
        <div class="layer-text">
          <div class="layer-name">Gondophares Record</div>
          <div class="layer-blurb">Archaeological proof of the Indo-Parthian king.</div>
        </div>
      </button>
      <button class="layer-row" data-tab="patristic">
        <div class="layer-num">02</div>
        <div class="layer-text">
          <div class="layer-name">Patristic Chain</div>
          <div class="layer-blurb">A global tradition spanning four centuries.</div>
        </div>
      </button>
    </div>
    <div class="rail-body" id="rail-body"></div>
  </div>

  <div class="stage">
    <div class="mobile-tabs">
      <button data-tab="gondophares">Gondophares</button>
      <button data-tab="patristic">Patristic</button>
    </div>

    <div class="map-pane" id="pane-gondophares"></div>
    <div class="map-pane" id="pane-patristic"></div>

    <div class="map-caption">
      <div class="num" id="cap-num">Map 1</div>
      <div class="ttl" id="cap-ttl">Gondophares Record</div>
    </div>
  </div>
</div>

<script>
const EC = window.EDITORIAL_C;

const tabInfo = {
  gondophares: {
    title: 'The Archaeological Record: Gondophares Confirmed',
    text: 'Archaeological discovery of 1st-century coins and the Takht-i-Bahi inscription validated the existence of King Gondophares, naming him precisely as the Acts of Thomas does.'
  },
  patristic: {
    title: 'The Patristic Chain: A Global Tradition',
    text: 'Spanning four centuries, the tradition of Thomas in India was recorded by writers from Spain to Mesopotamia, showing its widespread reception in the late antique world.'
  }
};

function buildStory(info, legendHtml) {
  return `<div class="story-eyebrow">Context</div>
          <div class="story-h">${info.title}</div>
          <div class="story-p">${info.text}</div>
          ${legendHtml || ''}`;
}

const legGondo = `
  <div class="legend-h">Key Sites</div>
  <div class="legend-list">
    <div class="legend-item"><div class="lg-dot" style="background:${EC.green}"></div> Indo-Parthian Capital</div>
    <div class="legend-item"><div class="lg-dot" style="background:${EC.red}"></div> Archaeological Site</div>
    <div class="legend-item"><div class="lg-dot" style="background:${EC.purple}"></div> Syriac Center</div>
    <div class="legend-item"><div class="lg-dot" style="background:${EC.india}"></div> Trade Port</div>
  </div>
`;

const legPatristic = `
  <div class="legend-h">Patristic Witnesses</div>
  <div class="legend-list">
    <div class="legend-item"><div class="lg-dot" style="background:${EC.purple}"></div> Edessa</div>
    <div class="legend-item"><div class="lg-dot" style="background:${EC.blue}"></div> Alexandria</div>
    <div class="legend-item"><div class="lg-dot" style="background:${EC.red}"></div> Jerome / Palestine</div>
    <div class="legend-item"><div class="lg-dot" style="background:${EC.india}"></div> Gregory / Tours</div>
    <div class="legend-item"><div class="lg-dot" style="background:${EC.olive}"></div> Isidore / Seville</div>
  </div>
`;

const maps = {};

// 1. Gondophares
maps.gondophares = window.makeMap('pane-gondophares', [30, 65], 4);
window.cityMark(maps.gondophares, 33.74, 72.83, 'Taxila', null, 'The historical capital of the Indo-Parthian kings.', EC.green, 8);
window.cityMark(maps.gondophares, 34.33, 71.93, 'Takht-i-Bahi', null, 'Site of the Kharosthi inscription mentioning "The Great King Guduphara".', EC.red, 8);
window.cityMark(maps.gondophares, 37.16, 38.79, 'Edessa', null, 'The Syriac city where the Acts of Thomas was composed.', EC.purple, 8);
window.cityMark(maps.gondophares, 21.7, 72.98, 'Barygaza', null, 'Major port connecting the Indo-Parthian northwest to maritime routes.', EC.india, 8);

// 2. Patristic
maps.patristic = window.makeMap('pane-patristic', [35, 30], 3);
window.cityMark(maps.patristic, 37.16, 38.79, 'Edessa', null, 'The theological home of the Thomas tradition.', EC.purple, 8);
window.cityMark(maps.patristic, 31.2, 29.9, 'Alexandria', null, 'Where Origen (c. 230 CE) first recorded Thomas being assigned to Parthia.', EC.blue, 8);
window.cityMark(maps.patristic, 31.77, 35.23, 'Palestine', 'Jerome', 'Jerome (c. 400 CE) records Thomas martyred in "Calamina, India".', EC.red, 8);
window.cityMark(maps.patristic, 47.39, 0.68, 'Tours', 'Gregory of Tours', 'Gregory (c. 590 CE) records a report of a monastery at the Indian tomb.', EC.india, 8);
window.cityMark(maps.patristic, 37.38, -5.98, 'Seville', 'Isidore', 'Isidore (c. 636 CE) confirms the tradition in his global encyclopedia.', EC.olive, 8);

const layers = {
  gondophares: { map: maps.gondophares, figNum: 'MAP 1', figTtl: tabInfo.gondophares.title, story: buildStory(tabInfo.gondophares, legGondo) },
  patristic: { map: maps.patristic, figNum: 'MAP 2', figTtl: tabInfo.patristic.title, story: buildStory(tabInfo.patristic, legPatristic) }
};
window.wireLayerNav(layers);

</script>
</body>
</html>
