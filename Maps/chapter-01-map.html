<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cosmopolitan Matrix — Editorial</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="../js/map-data.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --paper: #f4ede0;
  --paper-2: #ede4d2;
  --paper-3: #e3d7be;
  --ink: #1a1612;
  --ink-2: #443a2e;
  --ink-3: #6e6151;
  --line: #c8b89a;
  --line-2: #d8c8a8;
  --rule: #1a1612;
  --accent: #b8421f;
  --serif: 'Source Serif 4', Georgia, serif;
  --sans: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}
html, body { height: 100%; width: 100%; overflow: hidden; background: var(--paper); color: var(--ink); font-family: var(--serif); }

#root { position: fixed; inset: 0; display: grid; }
@media (min-width: 880px) {
  #root { grid-template-columns: 360px 1fr; }
}

/* ─── STORY RAIL (left sidebar on desktop, bottom on mobile) ─── */
.rail {
  background: var(--paper);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  position: relative;
  overflow: hidden;
}
.rail-head {
  padding: 22px 28px 18px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  background: var(--paper);
}
.masthead { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.masthead-mark {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--ink); color: var(--paper);
  display: grid; place-items: center;
  font-family: var(--serif); font-weight: 700; font-size: 14px;
  font-variation-settings: 'opsz' 60;
}
.masthead-name {
  font-family: var(--mono); font-size: 10px; letter-spacing: 1.6px;
  text-transform: uppercase; color: var(--ink-2);
}
.chapter-eyebrow {
  font-family: var(--mono); font-size: 10px; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
}
.chapter-title {
  font-family: var(--serif); font-weight: 600;
  font-size: 28px; line-height: 1.05; letter-spacing: -0.4px;
  color: var(--ink);
  font-variation-settings: 'opsz' 60;
}

/* Layer rail nav (vertical on desktop) */
.layer-nav {
  display: flex; flex-direction: column;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.layer-row {
  display: flex; align-items: stretch; gap: 12px;
  padding: 14px 28px;
  background: transparent; border: none;
  border-left: 3px solid transparent;
  cursor: pointer;
  text-align: left;
  transition: 0.16s;
  border-bottom: 1px solid var(--line-2);
  font-family: inherit;
}
.layer-row:last-child { border-bottom: none; }
.layer-row:hover { background: var(--paper-2); }
.layer-row.active {
  background: var(--paper-2);
  border-left-color: var(--accent);
}
.layer-num {
  font-family: var(--mono); font-size: 10px;
  color: var(--ink-3); letter-spacing: 1px;
  width: 24px;
  flex-shrink: 0;
  padding-top: 3px;
}
.layer-row.active .layer-num { color: var(--accent); font-weight: 500; }
.layer-text { flex: 1; min-width: 0; }
.layer-name {
  font-family: var(--serif); font-weight: 600;
  font-size: 16px; color: var(--ink); line-height: 1.2;
  letter-spacing: -0.2px;
  font-variation-settings: 'opsz' 14;
}
.layer-blurb {
  font-family: var(--sans); font-size: 12px;
  color: var(--ink-3); line-height: 1.4;
  margin-top: 3px;
}

.rail-body {
  flex: 1;
  overflow-y: auto;
  padding: 18px 28px 48px;
  -webkit-mask-image: linear-gradient(to bottom, black calc(100% - 40px), transparent 100%);
  mask-image: linear-gradient(to bottom, black calc(100% - 40px), transparent 100%);
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}
.rail-body::-webkit-scrollbar { width: 6px; }
.rail-body::-webkit-scrollbar-track { background: transparent; }
.rail-body::-webkit-scrollbar-thumb { background-color: var(--line); border-radius: 4px; border: 2px solid transparent; background-clip: padding-box; }
.story-eyebrow {
  font-family: var(--mono); font-size: 10px; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
}
.story-h {
  font-family: var(--serif); font-weight: 600;
  font-size: 19px; line-height: 1.2;
  color: var(--ink); margin-bottom: 12px;
  letter-spacing: -0.2px;
  font-variation-settings: 'opsz' 24;
}
.story-p {
  font-family: var(--serif); font-size: 14.5px;
  line-height: 1.65; color: var(--ink-2);
  margin-bottom: 14px;
}
.story-p strong { color: var(--ink); font-weight: 600; }
.pull-quote {
  font-family: var(--serif); font-style: italic; font-weight: 500;
  font-size: 17px; line-height: 1.35;
  color: var(--ink); padding: 12px 0 12px 16px;
  border-left: 3px solid var(--accent);
  margin: 18px 0 18px;
  font-variation-settings: 'opsz' 24;
}
.legend-h {
  font-family: var(--mono); font-size: 10px; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--ink-3);
  margin: 18px 0 10px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
}
.legend-list { display: flex; flex-direction: column; gap: 5px; }
.legend-item {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--sans); font-size: 13px; color: var(--ink-2);
  padding: 2px 0;
}
.lg-line { width: 22px; height: 2.5px; flex-shrink: 0; }
.lg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.15); }
.lg-box { width: 18px; height: 10px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.1); }

/* ─── MAP STAGE ─── */
.stage {
  position: relative;
  overflow: hidden;
  background: #e0d4be;
}
.map-pane { position: absolute; inset: 0; display: none; }
.map-pane.active { display: block; }

/* Tile filter — light, parchment-friendly */
.leaflet-tile-pane {
  filter: grayscale(1) brightness(1.15) contrast(0.6) sepia(0.65) saturate(0.5);
}

/* ─── MOBILE NAV ─── */
.mobile-tabs {
  display: none;
}
@media (max-width: 879px) {
  #root { grid-template-rows: auto 1fr auto; grid-template-columns: 1fr; }
  .rail {
    grid-row: 3;
    border-right: none; border-top: 1px solid var(--line);
    max-height: 50vh;
  }
  .rail-head { padding: 14px 18px 12px; }
  .chapter-title { font-size: 21px; }
  .layer-nav { display: none; }
  .rail-body { padding: 14px 18px 22px; }

  .mobile-tabs {
    display: flex;
    grid-row: 1;
    overflow-x: auto;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    scrollbar-width: none;
  }
  .mobile-tabs::-webkit-scrollbar { display: none; }
  .mobile-tabs button {
    flex-shrink: 0;
    background: transparent; border: none;
    padding: 14px 16px;
    font-family: var(--sans); font-weight: 500; font-size: 13px;
    color: var(--ink-3); cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .mobile-tabs button.active {
    color: var(--ink); border-bottom-color: var(--accent);
    font-weight: 600;
  }
  .stage { grid-row: 2; }
}

/* ─── POPUP ─── */
.leaflet-popup-content-wrapper {
  background: var(--paper) !important;
  border: 1px solid var(--ink) !important;
  border-radius: 0 !important;
  box-shadow: 4px 4px 0 rgba(26,22,18,0.12) !important;
  color: var(--ink) !important;
  font-family: var(--serif) !important;
  max-width: min(280px, 80vw) !important;
}
.leaflet-popup-content { margin: 14px 16px !important; font-size: 13.5px !important; line-height: 1.55 !important; }
.leaflet-popup-tip-container { display: none !important; }
.leaflet-popup-close-button {
  color: var(--ink) !important; font-size: 18px !important;
  top: 4px !important; right: 6px !important; padding: 4px 8px !important;
}
.popup-name {
  font-family: var(--serif); font-weight: 600; color: var(--ink);
  font-size: 16px; letter-spacing: -0.2px; margin-bottom: 1px;
  font-variation-settings: 'opsz' 24;
}
.popup-stage {
  font-family: var(--mono); font-size: 9px; letter-spacing: 1.3px;
  text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
}
.popup-body { font-size: 13.5px; color: var(--ink-2); line-height: 1.55; }

/* ─── ZOOM CONTROL ─── */
.leaflet-control-zoom {
  border: 1px solid var(--ink) !important;
  margin: 14px !important;
  box-shadow: 3px 3px 0 rgba(26,22,18,0.15) !important;
  border-radius: 0 !important;
  overflow: hidden;
}
.leaflet-control-zoom a {
  background: var(--paper) !important;
  color: var(--ink) !important;
  border-color: var(--ink) !important;
  width: 34px !important; height: 34px !important;
  line-height: 34px !important; font-size: 16px !important;
  font-family: var(--serif) !important; font-weight: 500 !important;
}
.leaflet-control-zoom a:hover { background: var(--paper-2) !important; }

/* Map credit */
.credit {
  position: absolute; bottom: 8px; right: 12px;
  font-family: var(--mono); font-size: 9px;
  color: rgba(26,22,18,0.4);
  pointer-events: none;
  letter-spacing: 0.4px;
  background: rgba(244,237,224,0.7);
  padding: 2px 6px;
}

/* Caption strip on map (current layer) */
.map-caption {
  position: absolute;
  top: 14px; left: 14px;
  z-index: 800;
  background: var(--paper);
  border: 1px solid var(--ink);
  padding: 9px 14px;
  max-width: calc(100% - 80px);
  box-shadow: 3px 3px 0 rgba(26,22,18,0.15);
}
.map-caption .num {
  font-family: var(--mono); font-size: 9px; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--accent);
  margin-bottom: 2px;
}
.map-caption .ttl {
  font-family: var(--serif); font-weight: 600;
  font-size: 14px; line-height: 1.15; color: var(--ink);
  letter-spacing: -0.1px;
}
@media (max-width: 879px){
  .map-caption { top: 10px; left: 10px; padding: 6px 10px; }
  .map-caption .ttl { font-size: 12.5px; }
}
</style>
</head>
<body>

<div id="error-log" style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:10px;display:none;max-height:50vh;overflow:auto;width:100%;"></div>
<script>
  window.addEventListener('error', function(e) {
    document.getElementById('error-log').style.display = 'block';
    document.getElementById('error-log').innerHTML += '<br>' + e.message + ' at ' + e.filename + ':' + e.lineno;
  });
  window.addEventListener('unhandledrejection', function(e) {
    document.getElementById('error-log').style.display = 'block';
    document.getElementById('error-log').innerHTML += '<br>Promise Rejection: ' + e.reason;
  });
</script>

<div id="root">
  <!-- Mobile tabs -->
  <nav class="mobile-tabs" id="mobile-tabs">
    <button class="active" data-tab="political">Political</button>
    <button data-tab="maritime">Maritime</button>
    <button data-tab="silkroad">Silk Roads</button>
    <button data-tab="evidence">Archaeology</button>
    <button data-tab="languages">Languages</button>
  </nav>

  <!-- Story rail -->
  <aside class="rail"> 
    <div class="rail-head">
      <div class="masthead">
        <div class="masthead-mark">I</div>
        <div class="masthead-name">The Matrix - Oikouménē</div>
	</div>
            <div class="chapter-eyebrow">The Inhabited world · c. 50 CE</div>
	<div class="chapter-title">The Cosmopolitan Network</div>
    </div>
 

    <nav class="layer-nav" id="layer-nav">
      <button class="layer-row active" data-tab="political">
        <div class="layer-num">01</div>
        <div class="layer-text">
          <div class="layer-name">The Political World</div>
          <div class="layer-blurb">Overlapping empires of the 1st century</div>
        </div>
      </button>
      <button class="layer-row" data-tab="maritime">
        <div class="layer-num">02</div>
        <div class="layer-text">
          <div class="layer-name">The Maritime Web</div>
          <div class="layer-blurb">Alexandria to Malabar in four stages</div>
        </div>
      </button>
      <button class="layer-row" data-tab="silkroad">
        <div class="layer-num">03</div>
        <div class="layer-text">
          <div class="layer-name">The Overland Silk Roads</div>
          <div class="layer-blurb">Chang'an to Antioch through Central Asia</div>
        </div>
      </button>
      <button class="layer-row" data-tab="evidence">
        <div class="layer-num">04</div>
        <div class="layer-text">
          <div class="layer-name">Archaeological Evidence</div>
          <div class="layer-blurb">Coins, pepper, graffiti — material proof</div>
        </div>
      </button>
      <button class="layer-row" data-tab="languages">
        <div class="layer-num">05</div>
        <div class="layer-text">
          <div class="layer-name">Language Zones</div>
          <div class="layer-blurb">Greek + Aramaic — a universal passport</div>
        </div>
      </button>
    </nav>

    <div class="rail-body" id="rail-body"></div>
    </aside>

  <!-- Map stage -->
  <div class="stage">
    <div class="map-pane active" id="pane-political"></div>
    <div class="map-pane" id="pane-maritime"></div>
    <div class="map-pane" id="pane-silkroad"></div>
    <div class="map-pane" id="pane-evidence"></div>
    <div class="map-pane" id="pane-languages"></div>

    <div class="map-caption">
      <div class="num" id="cap-num">FIG. 01</div>
      <div class="ttl" id="cap-ttl">The Political World · c. 50 CE</div>
    </div>
    <div class="credit">Tiles © Esri · After the Periplus Maris Erythraei</div>
  </div>
</div>

<script>
const D = window.MAP_DATA;

// Light-paper-friendly palette: deeper, slightly desaturated colors
const C = {
  rome:'#a83232', parthian:'#2f5fa8', indoparth:'#2f7a4d',
  india:'#a85f1c', chera:'#b8702a', arabia:'#8a6028', hinge:'#7a3aa8',
  blue:'#3a6ba8', pink:'#a8408a', green:'#2fa86a', olive:'#6e8a30',
  gold:'#a8782a', red:'#a82a2a', chinese:'#5a8a2a',
  orange:'#a85020', purple:'#7a30a8'
};
const POLY_OPTS = (c, op=0.22) => ({ color: c, fillColor: c, fillOpacity: op, weight: 1.4 });

function popup(name, stage, body) {
  return `<div class="popup-name">${name}</div>${stage?`<div class="popup-stage">${stage}</div>`:''}<div class="popup-body">${body}</div>`;
}
function cityMark(map, lat, lng, name, stage, desc, color, r) {
  r = r || 6;
  L.circleMarker([lat, lng], {
    radius: r, color: '#1a1612', weight: 1,
    fillColor: color, fillOpacity: 1
  }).bindPopup(popup(name, stage, desc), { maxWidth: 280, autoPan: true }).addTo(map);
}
function regionLabels(map) {
  if (!map.getPane('regionLabels')) {
    map.createPane('regionLabels');
    map.getPane('regionLabels').style.zIndex = 350;
    map.getPane('regionLabels').style.pointerEvents = 'none';
  }
  const z = map.getZoom();
  const showSub = z >= 4;
  const rs = "font-family:'Source Serif 4',Georgia,serif;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#fbf6ec;text-shadow:0 0 3px #1a1612,0 0 3px #1a1612,0 0 6px rgba(26,22,18,0.85),0 1px 0 #1a1612;pointer-events:none;white-space:nowrap;-webkit-font-smoothing:antialiased;";
  const ss = "font-family:'IBM Plex Sans',sans-serif;font-size:10px;color:#e8d9b8;letter-spacing:0.6px;display:block;margin-top:2px;text-transform:none;font-weight:500;text-shadow:0 0 3px #1a1612,0 0 3px #1a1612,0 1px 0 #1a1612;";
  const os = "font-family:'Source Serif 4',Georgia,serif;font-style:italic;font-weight:500;letter-spacing:3px;color:#cfe3ff;text-shadow:0 0 3px #0d2440,0 0 3px #0d2440,0 0 6px rgba(13,36,64,0.9);pointer-events:none;white-space:nowrap;text-transform:uppercase;";
  const layerGroup = L.layerGroup().addTo(map);
  const render = () => {
    layerGroup.clearLayers();
    const zoom = map.getZoom();
    const sub = zoom >= 4;
    D.REGIONS.forEach(([lat,lng,name,modern,size]) => {
      const fs = Math.max(9, size - (zoom < 4 ? 2 : 0));
      const subHtml = sub ? `<span style="${ss}">${modern}</span>` : '';
      L.marker([lat,lng], { pane:'regionLabels', icon: L.divIcon({ html: `<div style="${rs}font-size:${fs}px;">${name}${subHtml}</div>`, className:'', iconAnchor:[0,0] }), interactive:false }).addTo(layerGroup);
    });
    D.OCEANS.forEach(([lat,lng,name,modern,size]) => {
      const fs = Math.max(9, Math.round(size * 0.55));
      L.marker([lat,lng], { pane:'regionLabels', icon: L.divIcon({ html: `<div style="${os}font-size:${fs}px;">${name}</div>`, className:'', iconAnchor:[0,0] }), interactive:false }).addTo(layerGroup);
    });
  };
  render();
  map.on('zoomend', render);
}
function makeMap(paneId, center, zoom){
  const map = L.map(paneId, { center, zoom, zoomControl: false, preferCanvas: true });
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '', maxZoom: 12 }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  return map;
}

const inits = {
  political(){
    const m = makeMap('pane-political', [25, 50], 3);
    L.polygon(D.POLY.roman, POLY_OPTS(C.rome)).addTo(m).bindPopup(popup('Roman Empire','c. 14–68 CE','Stretched from Britannia to Egypt. Western senators knew India only as abstraction; eastern merchants navigated Malabar annually.'));
    L.polygon(D.POLY.britain, POLY_OPTS(C.rome)).addTo(m);
    L.polygon(D.POLY.parthian, POLY_OPTS(C.parthian)).addTo(m).bindPopup(popup('Parthian Empire','247 BCE – 224 CE','The Great Middleman. All overland trade Rome↔India was mediated by Parthia.'));
    L.polygon(D.POLY.indoParthian, POLY_OPTS(C.indoparth)).addTo(m).bindPopup(popup('Indo-Parthian','1st c. BCE – 3rd c. CE','Their coins bore Greek legends.'));
    L.polygon(D.POLY.chera, POLY_OPTS(C.chera)).addTo(m).bindPopup(popup('Chera Kingdom','Malabar Coast','Home of Muziris and the pepper monopoly.'));
    L.polygon(D.POLY.cholaPandya, POLY_OPTS(C.india)).addTo(m).bindPopup(popup('Chola & Pandya','Coromandel Coast','Hinge of two oceans.'));
    L.polygon(D.POLY.arabia, POLY_OPTS(C.arabia)).addTo(m).bindPopup(popup('Arabian Zone','Nabataean, Himyarite','Frankincense control made Arabia essential.'));
    D.CITIES.political.forEach(([lat,lng,n,s,d,c,r]) => cityMark(m,lat,lng,n,s,d,C[c],r));
    regionLabels(m);
    return m;
  },
  maritime(){
    const m = makeMap('pane-maritime', [18, 65], 3);
    L.polyline(D.ROUTES.nile, { color: C.blue, weight: 2.5, opacity: 0.9 }).addTo(m).bindPopup(popup('Nile Corridor','Stage 1a',''));
    L.polyline(D.ROUTES.desert, { color: C.india, weight: 2.5, dashArray: '4,4', opacity: 0.85 }).addTo(m).bindPopup(popup('Eastern Desert','Stage 1b — 12 days',''));
    L.polyline(D.ROUTES.redSea, { color: C.pink, weight: 2.5, opacity: 0.9 }).addTo(m).bindPopup(popup('Red Sea','Stage 2',''));
    L.polyline(D.ROUTES.monsoon, { color: C.green, weight: 3.2, opacity: 0.95 }).addTo(m).bindPopup(popup('Monsoon Crossing','Stage 3 — c. 40 days',''));
    L.polyline(D.ROUTES.returnVoyage, { color: '#856030', weight: 1.8, dashArray: '3,5', opacity: 0.55 }).addTo(m);
    L.polyline(D.ROUTES.nwIndia, { color: C.olive, weight: 2.2, opacity: 0.85 }).addTo(m).bindPopup(popup('NW India Branch','Alternative','To Barygaza.'));
    L.polyline(D.ROUTES.persian, { color: C.purple, weight: 2.4, opacity: 0.85 }).addTo(m).bindPopup(popup('Persian-Arab Maritime','Persian Gulf to India',''));
    L.polyline(D.ROUTES.palghat, { color: C.gold, weight: 2.2, opacity: 0.9 }).addTo(m).bindPopup(popup('Palghat Gap','Internal Route',''));
    L.polyline(D.ROUTES.deccan, { color: '#8a6028', weight: 2.2, dashArray: '4,5', opacity: 0.8 }).addTo(m).bindPopup(popup('Deccan Internal','N–S Corridor',''));
    L.polyline(D.ROUTES.kollamLanka, { color: '#a8782a', weight: 1.8, opacity: 0.85 }).addTo(m).bindPopup(popup('Kollam → Sri Lanka','Periplus Onward',''));
    L.polyline(D.ROUTES.lankaCircuit, { color: C.chera, weight: 1.8, opacity: 0.85 }).addTo(m);
    L.polyline(D.ROUTES.chinese, { color: C.chinese, weight: 2.6, opacity: 0.9 }).addTo(m).bindPopup(popup('Chinese Segment','East→West','Roman merchants did not sail east of Sri Lanka.'));
    D.CITIES.maritime.forEach(([lat,lng,n,s,d,c,r]) => cityMark(m,lat,lng,n,s,d,C[c],r));
    regionLabels(m);
    return m;
  },
  silkroad(){
    const m = makeMap('pane-silkroad', [36, 65], 3);
    L.polyline(D.ROUTES.silkMain, { color: C.gold, weight: 3.4, opacity: 0.95 }).addTo(m).bindPopup(popup('Main Silk Road',"Chang'an → Antioch",''));
    L.polyline(D.ROUTES.silkPersian, { color: '#6e4818', weight: 2.6, opacity: 0.85 }).addTo(m).bindPopup(popup('Southern Persian Route','via Nishapur, Isfahan',''));
    L.polyline(D.ROUTES.silkIndia, { color: C.indoparth, weight: 2.6, opacity: 0.9 }).addTo(m).bindPopup(popup('Branch to India','via Bactria, Taxila',''));
    L.polyline(D.ROUTES.silkCircuit, { color: '#c8902a', weight: 2.2, dashArray: '5,4', opacity: 0.85 }).addTo(m).bindPopup(popup('Circuit',"Chang'an → Hepu",''));
    L.polyline([...D.ROUTES.redSea, ...D.ROUTES.monsoon], { color: C.green, weight: 1.4, dashArray: '3,5', opacity: 0.32, interactive: false }).addTo(m);
    D.CITIES.silkroad.forEach(([lat,lng,n,s,d,c,r]) => cityMark(m,lat,lng,n,s,d,C[c],r));
    regionLabels(m);
    return m;
  },
  evidence(){
    const m = makeMap('pane-evidence', [16, 65], 3);
    L.polyline([...D.ROUTES.redSea, ...D.ROUTES.monsoon], { color: C.blue, weight: 1.4, dashArray: '3,6', opacity: 0.4 }).addTo(m);
    D.CITIES.evidence.forEach(([lat,lng,n,s,d,c,r]) => cityMark(m,lat,lng,n,s,d,C[c],r));
    regionLabels(m);
    return m;
  },
  languages(){
    const m = makeMap('pane-languages', [28, 42], 3);
    L.polygon(D.POLY.greek, POLY_OPTS(C.blue, 0.22)).addTo(m).bindPopup(popup('Greek (Koinē)','after 334 BCE','Common tongue from the Mediterranean to NW India.'));
    L.polygon(D.POLY.greekEast, POLY_OPTS(C.blue, 0.12)).addTo(m).bindPopup(popup('Greek Reach East','Yavana Merchants',''));
    L.polygon(D.POLY.aramaic, POLY_OPTS(C.orange, 0.22)).addTo(m).bindPopup(popup('Aramaic / Syriac','Lingua Franca','Spoken language of Jesus.'));
    L.polygon(D.POLY.overlap, POLY_OPTS(C.purple, 0.36)).addTo(m).bindPopup(popup('Bilingual Overlap','Greek + Aramaic','The Levant.'));
    D.CITIES.languages.forEach(([lat,lng,n,s,d,c]) => cityMark(m,lat,lng,n,s,d,C[c]));
    regionLabels(m);
    return m;
  }
};

const figNum = { political:'01', maritime:'02', silkroad:'03', evidence:'04', languages:'05' };

const inited = {};
const mapInstances = {};
function showLayer(t){
  document.querySelectorAll('.layer-row').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
  document.querySelectorAll('.mobile-tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
  document.querySelectorAll('.map-pane').forEach(p => p.classList.toggle('active', p.id === 'pane-'+t));
  if (!inited[t]) { inited[t] = true; mapInstances[t] = inits[t](); }
  if (mapInstances[t]) { setTimeout(() => mapInstances[t].invalidateSize(), 50); }
  const inf = D.tabInfo[t];
  document.getElementById('cap-num').textContent = 'FIG. ' + figNum[t];
  document.getElementById('cap-ttl').textContent = inf.title;
  document.getElementById('rail-body').innerHTML = `
    <div class="story-eyebrow">Layer ${figNum[t]} · ${inf.short}</div>
    <div class="story-h">${inf.title}</div>
    <div class="story-p">${inf.text}</div>
    <div class="pull-quote">${pulls[t]}</div>
    ${legendHTML[t]||''}
  `;
}

document.querySelectorAll('.layer-row').forEach(b => b.addEventListener('click', () => showLayer(b.dataset.tab)));
document.querySelectorAll('.mobile-tabs button').forEach(b => b.addEventListener('click', () => showLayer(b.dataset.tab)));

showLayer('political');
