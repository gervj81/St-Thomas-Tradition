<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Cosmopolitan Matrix — Maps</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0600; font-family: 'EB Garamond', Georgia, serif; }

:root {
  --gold: #c9963a;
  --gold-light: #e8c06a;
  --ink: #0a0600;
  --border: #6a4e1e;
  --text: #f0e4c0;
  --text-muted: #c8a870;
  --panel-bg: rgba(10,6,0,0.97);
  --tab-h: 58px;
  --header-h: 52px;
}

/* ── HEADER ── */
#app-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: linear-gradient(180deg, #050300 0%, #0e0800 100%);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  z-index: 2000;
}
#app-title {
  font-family: 'Cinzel', serif;
  font-size: 0.78em;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--gold-light);
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
/* Legend pull-tab */
@keyframes arrow-bounce {
  0%   { transform: translateX(0); }
  30%  { transform: translateX(5px); }
  60%  { transform: translateX(0px); }
  80%  { transform: translateX(3px); }
  100% { transform: translateX(0); }
}
.arrow-animate {
  animation: arrow-bounce 0.7s ease-in-out;
}
#legend-pull-tab {
  position: fixed;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  z-index: 1600;
  display: flex;
  align-items: center;
  cursor: pointer;
  transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
}
#legend-pull-tab.open {
  left: 270px;
}
#legend-tab-body {
  background: linear-gradient(180deg, #1e1204 0%, #0e0800 100%);
  border: 1px solid var(--border);
  border-left: none;
  border-radius: 0 8px 8px 0;
  padding: 22px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  box-shadow: 3px 0 14px rgba(0,0,0,0.6);
}
#legend-tab-body .tab-label {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  font-family: 'Cinzel', serif;
  font-size: 0.7em;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--gold-light);
  text-transform: uppercase;
  white-space: nowrap;
  user-select: none;
}
#legend-tab-body .tab-arrow {
  font-size: 1.1em;
  color: var(--gold);
  transition: transform 0.3s;
  line-height: 1;
  user-select: none;
}
#legend-pull-tab.open #legend-tab-body .tab-arrow {
  transform: rotate(180deg);
}


/* ── MAP CONTAINER ── */
#map-container {
  position: fixed;
  top: var(--header-h);
  left: 0; right: 0;
  bottom: var(--tab-h);
  z-index: 1;
}
.map-pane {
  position: absolute;
  inset: 0;
  display: none;
}
.map-pane.active { display: block; }

/* ── TAB BAR (bottom) ── */
#tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--tab-h);
  background: #050300;
  border-top: 1px solid var(--border);
  display: flex;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  z-index: 2000;
}
#tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 0 0 auto;
  padding: 0 18px;
  height: 100%;
  background: transparent;
  border: none;
  border-top: 3px solid transparent;
  color: #c8a85a;
  font-family: 'Cinzel', serif;
  font-size: 0.72em;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
  cursor: pointer;
  display: flex; align-items: center;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
  min-width: 44px;
}
.tab-btn:hover, .tab-btn:active { color: var(--gold-light); background: rgba(201,150,58,0.08); }
.tab-btn.active { color: var(--gold-light); border-top-color: var(--gold); background: rgba(201,150,58,0.1); }

/* ── LEGEND DRAWER (slides from left) ── */
#legend-drawer {
  position: fixed;
  top: var(--header-h);
  left: 0;
  bottom: var(--tab-h);
  width: 270px;
  background: var(--panel-bg);
  border-right: 1px solid var(--border);
  z-index: 1500;
  transform: translateX(-100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
}
#legend-drawer.open { transform: translateX(0); }
#legend-header {
  padding: 16px 16px 10px;
  border-bottom: 1px solid var(--border);
  font-family: 'Cinzel', serif;
  font-size: 0.72em;
  letter-spacing: 2px;
  color: var(--gold);
  text-transform: uppercase;
  flex-shrink: 0;
}
#legend-content {
  padding: 14px 16px;
  flex: 1;
  overflow-y: auto;
}
.legend-section { margin-bottom: 16px; }
.legend-title {
  font-family: 'Cinzel', serif;
  font-size: 0.75em;
  letter-spacing: 1.5px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 8px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 7px 0;
  color: #e8d8b0;
  font-size: 1em;
  line-height: 1.4;
}
.lc { width: 24px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.lc-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.3); }
.lc-line { width: 24px; height: 3px; border-radius: 1px; flex-shrink: 0; }
.legend-note {
  font-style: italic;
  color: #c8ab70;
  font-size: 0.92em;
  line-height: 1.5;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid rgba(106,78,30,0.5);
}

/* ── OVERLAY (dim map when drawer open) ── */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 1400;
  display: none;
  opacity: 0;
  transition: opacity 0.3s;
}
#overlay.active { display: block; opacity: 1; }

/* ── INFO PANEL (tab description, slides from bottom) ── */
#info-panel {
  position: fixed;
  left: 0; right: 0;
  bottom: var(--tab-h);
  background: var(--panel-bg);
  border-top: 1px solid var(--border);
  z-index: 1500;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  padding: 16px 18px;
  max-height: 40vh;
  overflow-y: auto;
}
#info-panel.open { transform: translateY(0); }
#info-panel-title {
  font-family: 'Cinzel', serif;
  font-size: 0.78em;
  letter-spacing: 1.5px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 8px;
}
#info-panel-text {
  font-size: 1em;
  color: #c8b07a;
  line-height: 1.65;
}
#info-panel-text strong { color: var(--gold-light); }
#info-close {
  position: absolute;
  top: 12px; right: 14px;
  width: 34px; height: 34px;
  background: rgba(201,150,58,0.15);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--gold);
  font-size: 1.1em;
  cursor: pointer;
}

/* ── LEAFLET OVERRIDES ── */
.leaflet-tile-pane { filter: brightness(0.4) contrast(1.2) sepia(0.4) saturate(0.8) hue-rotate(-10deg); }
.leaflet-popup-content-wrapper {
  background: #130d04 !important;
  border: 1px solid var(--border) !important;
  border-radius: 6px !important;
  box-shadow: 0 4px 24px rgba(0,0,0,0.8) !important;
  color: var(--text) !important;
  font-family: 'EB Garamond', Georgia, serif !important;
  max-width: min(290px, 85vw) !important;
}
.leaflet-popup-content {
  margin: 14px 16px 12px !important;
  font-size: 1.1em !important;
  line-height: 1.55 !important;
}
.leaflet-popup-tip-container { display: none !important; }
.leaflet-popup-close-button {
  color: var(--gold) !important;
  font-size: 22px !important;
  top: 6px !important; right: 8px !important;
  width: 36px !important; height: 36px !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
}
.popup-city {
  font-family: 'Cinzel', serif;
  font-size: 1.15em;
  font-weight: 600;
  color: var(--gold-light);
  margin-bottom: 2px;
}
.popup-stage {
  font-family: 'Cinzel', serif;
  font-size: 0.85em;
  letter-spacing: 1px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 7px;
  opacity: 0.85;
}
.popup-body { font-size: 1.05em; color: #c8b47a; line-height: 1.55; }
.leaflet-control-zoom {
  border: 1px solid var(--border) !important;
  border-radius: 4px !important;
  overflow: hidden;
}
.leaflet-control-zoom a {
  background: rgba(10,6,0,0.9) !important;
  color: var(--gold) !important;
  border-color: var(--border) !important;
  width: 40px !important;
  height: 40px !important;
  line-height: 40px !important;
  font-size: 18px !important;
}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div id="app-header">
  <div id="app-title">The Cosmopolitan Matrix</div>
</div>

<!-- ── MAP PANES ── -->
<div id="map-container">
  <div id="pane-political" class="map-pane active"></div>
  <div id="pane-maritime" class="map-pane"></div>
  <div id="pane-silkroad" class="map-pane"></div>
  <div id="pane-evidence" class="map-pane"></div>
  <div id="pane-languages" class="map-pane"></div>
</div>

<!-- ── OVERLAY ── -->
<div id="overlay" onclick="closeAll()"></div>

<!-- ── LEGEND DRAWER ── -->
<!-- ── LEGEND PULL TAB ── -->
<div id="legend-pull-tab" onclick="toggleLegend()">
  <div id="legend-tab-body">
    <div class="tab-label">Legend</div>
    <div class="tab-arrow">›</div>
  </div>
</div>

<div id="legend-drawer">
  <div id="legend-header">Legend</div>
  <div id="legend-content">
    <!-- filled by JS per active tab -->
  </div>
</div>

<!-- ── INFO PANEL ── -->
<div id="info-panel">
    <div id="info-panel-title"></div>
  <div id="info-panel-text"></div>
</div>

<!-- ── TAB BAR ── -->
<nav id="tab-bar">
  <button class="tab-btn active" onclick="showTab('political',this)">Political World</button>
  <button class="tab-btn" onclick="showTab('maritime',this)">Maritime Route</button>
  <button class="tab-btn" onclick="showTab('silkroad',this)">Silk Roads</button>
  <button class="tab-btn" onclick="showTab('evidence',this)">Archaeology</button>
  <button class="tab-btn" onclick="showTab('languages',this)">Languages</button>
</nav>

<script>
// ─────────────────────────────────────────────
// UI CONTROLS
// ─────────────────────────────────────────────
function toggleLegend() {
  const d = document.getElementById('legend-drawer');
  const ov = document.getElementById('overlay');
  const tab = document.getElementById('legend-pull-tab');
  const ip = document.getElementById('info-panel');
  ip.classList.remove('open');
  const isOpen = d.classList.toggle('open');
  ov.classList.toggle('active', isOpen);
  tab.classList.toggle('open', isOpen);
  if (isOpen) updateLegend(currentTab);
}


function closeAll() {
  document.getElementById('legend-drawer').classList.remove('open');
  document.getElementById('info-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
  const tab = document.getElementById('legend-pull-tab');
  if (tab) tab.classList.remove('open');
}

// ─────────────────────────────────────────────
// TAB INFO TEXT
// ─────────────────────────────────────────────
const tabInfo = {
  political: {
    title: 'The Political World · c. 50 CE',
    text: 'The 1st century CE was a world of overlapping empires: Rome, Parthia, the Indo-Parthian kingdoms, and the South Indian polities. <strong>The Parthian Empire was the great middleman</strong> — all overland trade between Rome and India was mediated through Parthian territory. Click any empire or city for details.'
  },
  maritime: {
    title: 'The Maritime Web: Alexandria to Malabar',
    text: 'A four-stage chain: Nile → Red Sea → Arabia → monsoon crossing. <strong>Strabo records 120 ships per year</strong> making the crossing from Egypt to India. The entire voyage Alexandria → Muziris took approximately 90–100 days. The green line shows the Chinese-operated eastward extension. Tap any port for details.'
  },
  silkroad: {
    title: 'The Overland Silk Roads',
    text: 'Running parallel to the maritime route, the Silk Road linked Chang\'an to Antioch through Central Asia and Parthian Mesopotamia. <strong>Its critical feature was not the silk but the human infrastructure</strong> — Aramaic, Sogdian, Jewish, Buddhist, and later Christian diaspora communities at every oasis. The gold line shows the circuit junction to the Han maritime ports. Tap any city for details.'
  },
  evidence: {
    title: 'Archaeological Evidence',
    text: '<strong>The trade was not a literary conceit — it was a physical reality.</strong> Roman coins of Augustus, Tiberius, Claudius and Nero found across South India and Sri Lanka. A Tamil Brahmi graffito scratched into pottery at Berenike, Egypt. Roman glass and coins in Han-dynasty tombs at Luoyang. Tap any site for excavation details.'
  },
  languages: {
    title: 'Language Zones · c. 50 CE',
    text: '<strong>Greek and Aramaic between them covered virtually the entire inhabited world from Britain to India.</strong> For a 1st-century apostle, these were not foreign languages — they were the languages of his community. Aramaic was spoken in Galilee; Greek in every commercial port from Alexandria to Barygaza. Tap zones and cities for details.'
  }
};

function updateInfo(tab) {
  const info = tabInfo[tab] || {};
  document.getElementById('info-panel-title').textContent = info.title || '';
  document.getElementById('info-panel-text').innerHTML = info.text || '';
}

// ─────────────────────────────────────────────
// LEGEND CONTENT PER TAB
// ─────────────────────────────────────────────
const legendHTML = {
  political: `
    <div class="legend-section">
      <div class="legend-title">Empires · c. 50 CE</div>
      <div class="legend-item"><div class="lc" style="background:#c44040;opacity:.7"></div>Roman Empire</div>
      <div class="legend-item"><div class="lc" style="background:#3a7acc;opacity:.7"></div>Parthian Empire</div>
      <div class="legend-item"><div class="lc" style="background:#3a9a58;opacity:.7"></div>Indo-Parthian</div>
      <div class="legend-item"><div class="lc" style="background:#c87820;opacity:.7"></div>South Indian Kingdoms</div>
      <div class="legend-item"><div class="lc" style="background:#aa7020;opacity:.7"></div>Arabian Zone</div>
    </div>
    <div class="legend-section">
      <div class="legend-title">Cities</div>
      <div class="legend-item"><div class="lc-dot" style="background:#c44040"></div>Roman world</div>
      <div class="legend-item"><div class="lc-dot" style="background:#aa55cc"></div>Syriac / Hinge zone</div>
      <div class="legend-item"><div class="lc-dot" style="background:#3a7acc"></div>Parthian world</div>
      <div class="legend-item"><div class="lc-dot" style="background:#c87820"></div>Indian world</div>
    </div>`,
  maritime: `
    <div class="legend-section">
      <div class="legend-title">Roman-Operated Route</div>
      <div class="legend-item"><div class="lc-line" style="background:#6a90cc"></div>Stage 1a: Nile River</div>
      <div class="legend-item"><div class="lc-line" style="background:#c87820"></div>Stage 1b: Desert Caravan</div>
      <div class="legend-item"><div class="lc-line" style="background:#cc55aa"></div>Stage 2: Red Sea → Arabia</div>
      <div class="legend-item"><div class="lc-line" style="background:#3acc80"></div>Stage 3: Monsoon Crossing</div>
      <div class="legend-item"><div class="lc-line" style="background:#88aa44"></div>NW India Branch</div>
      <div class="legend-item"><div class="lc-line" style="background:#aa6622;opacity:.5"></div>Return Voyage</div>
    </div>
    <div class="legend-section">
      <div class="legend-title">Persian-Operated Route</div>
      <div class="legend-item"><div class="lc-line" style="background:#bb70cc"></div>Persian Gulf to India</div>
    </div>
    <div class="legend-section">
      <div class="legend-title">Chinese-Operated Segment</div>
      <div class="legend-item"><div class="lc-line" style="background:#a0e870"></div>Sri Lanka → China</div>
      <div class="legend-note">⚠ Chinese / SE Asian vessels only — travelling east→west. Roman merchants did not sail east of Sri Lanka.</div>
    </div>
    <div class="legend-note">Alexandria → Muziris: ~90–100 days · 120 ships/year (Strabo)</div>`,
  silkroad: `
    <div class="legend-section">
      <div class="legend-title">Overland Silk Road</div>
      <div class="legend-item"><div class="lc-line" style="background:#c8982a"></div>Northern Route</div>
      <div class="legend-item"><div class="lc-line" style="background:#9a7018"></div>Persian Route</div>
      <div class="legend-item"><div class="lc-line" style="background:#3a9a58"></div>Branch to India</div>
      <div class="legend-item"><div class="lc-line" style="background:#e8c060"></div>Circuit: Chang'an → Hepu</div>
    </div>
    <div class="legend-section">
      <div class="legend-title">Ghost: Maritime Route</div>
      <div class="legend-item" style="opacity:0.6"><div class="lc-line" style="background:#3acc80;opacity:.5"></div>Sea route (faded)</div>
    </div>
    <div class="legend-note">These interconnected systems linked Chang'an, the Malabar ports, and Alexandria — a chain of overlapping networks.</div>`,
  evidence: `
    <div class="legend-section">
      <div class="legend-title">Archaeological Finds</div>
      <div class="legend-item"><div class="lc-dot" style="background:#cc3333;width:14px;height:14px"></div>Key excavation site</div>
      <div class="legend-item"><div class="lc-dot" style="background:#c87820;width:12px;height:12px"></div>Major trade site</div>
      <div class="legend-item"><div class="lc-dot" style="background:#d4a843;width:10px;height:10px"></div>Roman coin hoards</div>
      <div class="legend-item"><div class="lc-dot" style="background:#aa8830;width:8px;height:8px"></div>Trade evidence</div>
      <div class="legend-item"><div class="lc-dot" style="background:#a0e870;width:10px;height:10px"></div>Roman goods via intermediaries</div>
      <div class="legend-item"><div class="lc-dot" style="background:#c8982a;width:10px;height:10px"></div>Silk Road terminus</div>
    </div>
    <div class="legend-note">★ Tamil Brahmi graffito at Berenike = Indian presence in Egypt</div>`,
  languages: `
    <div class="legend-section">
      <div class="legend-title">Language Zones · c. 50 CE</div>
      <div class="legend-item"><div class="lc" style="background:#3a78cc;opacity:.6"></div>Greek (Koinē) Zone</div>
      <div class="legend-item"><div class="lc" style="background:#3a78cc;opacity:.3;border:1px dashed #3a78cc"></div>Greek Commercial Reach East</div>
      <div class="legend-item"><div class="lc" style="background:#c87028;opacity:.6"></div>Aramaic / Syriac Zone</div>
      <div class="legend-item"><div class="lc" style="background:#9944cc;opacity:.7"></div>Bilingual Overlap Zone</div>
    </div>
    <div class="legend-note">"A universal passport across the ancient world" — Greek + Aramaic between them covered the inhabited world from Britain to India.</div>`
};

function updateLegend(tab) {
  document.getElementById('legend-content').innerHTML = legendHTML[tab] || '';
}

// ─────────────────────────────────────────────
// TAB SYSTEM
// ─────────────────────────────────────────────
const maps = {};
let currentTab = 'political';

// Fix Leaflet popup close button
document.addEventListener('click', function(e) {
  const el = e.target.closest ? e.target.closest('.leaflet-popup-close-button') : null;
  if (el) e.preventDefault();
}, true);

function showTab(name, btn) {
  currentTab = name;
  document.querySelectorAll('.map-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pane-' + name).classList.add('active');
  btn.classList.add('active');
  closeAll();
  lazyInit(name);
  setTimeout(function(){ if (maps[name]) maps[name].invalidateSize(); }, 300);
  btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  // Auto-show info panel for this tab, then auto-dismiss after 4s
  updateInfo(name);
  const ip = document.getElementById('info-panel');
  const ov = document.getElementById('overlay');
  ip.classList.add('open');
  // No overlay dim for auto-show — less intrusive
  if (ip._autoDismiss) clearTimeout(ip._autoDismiss);
  ip._autoDismiss = setTimeout(function() {
    ip.classList.remove('open');
    ov.classList.remove('active');
  }, 10000);
}

// ─────────────────────────────────────────────
// TILE LAYER
// ─────────────────────────────────────────────
function tiles() {
  const base = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution: 'Tiles &copy; Esri', maxZoom: 17 }
  );
  return L.layerGroup([base]);
}


// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function popup(name, stage, body) {
  // Use the full body text without truncation to prevent cut-offs
  return `<div class="popup-city">${name}</div>${stage ? `<div class="popup-stage">${stage}</div>` : ''}<div class="popup-body">${body}</div>`;
}

function cityMark(map, lat, lng, name, stage, desc, color, r) {
  r = r || 12;
  let mz = 3;
  if (r === 11 || r === 10) mz = 4;
  else if (r < 10) mz = 5;

  const marker = L.circleMarker([lat, lng], {
    radius: r, color: '#e8d498', weight: 2,
    fillColor: color, fillOpacity: 0.92
  }).bindPopup(popup(name, stage, desc), { maxWidth: 280, autoPan: true });

  marker.minZoom = mz;
  if (!map._cityMarkers) {
    map._cityMarkers = [];
    map.on('zoomend', function() {
      const cz = map.getZoom();
      map._cityMarkers.forEach(m => {
        if (cz >= m.minZoom) { if (!map.hasLayer(m)) m.addTo(map); }
        else { if (map.hasLayer(m)) map.removeLayer(m); }
      });
    });
  }
  map._cityMarkers.push(marker);
  if (map.getZoom() >= mz) marker.addTo(map);
  return marker;
}

// LAZY INIT
// ─────────────────────────────────────────────
const inits = { political:initPolitical, maritime:initMaritime, languages:initLanguages, silkroad:initSilkRoad, evidence:initEvidence };
const inited = {};

function lazyInit(name) {
  if (inited[name]) return;
  inited[name] = true;
  if (typeof L === 'undefined') {
    const el = document.getElementById('pane-' + name);
    if (el) el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#c9963a;font-family:Cinzel,serif;padding:20px;text-align:center">Map library failed to load — check internet connection</div>';
    return;
  }
  inits[name]();
  setTimeout(function(){ if (maps[name]) maps[name].invalidateSize(); }, 300);
}

window.addEventListener('load', function() {
  const urlParams = new URLSearchParams(window.location.search);
  let initialTab = urlParams.get('tab') || window.location.hash.substring(1) || 'political';
  const tabs = ['political', 'maritime', 'silkroad', 'evidence', 'languages'];
  if (!tabs.includes(initialTab)) initialTab = 'political';
  
  const btns = document.querySelectorAll('.tab-btn');
  const btn = btns[tabs.indexOf(initialTab)] || btns[0];
  showTab(initialTab, btn);

  // Bounce the arrow 5 times to attract attention
  const arrow = document.querySelector('#legend-tab-body .tab-arrow');
  if (!arrow) return;
  let count = 0;
  function bounce() {
    if (count >= 5) return;
    count++;
    arrow.classList.remove('arrow-animate');
    void arrow.offsetWidth; // force reflow
    arrow.classList.add('arrow-animate');
    arrow.addEventListener('animationend', function handler() {
      arrow.removeEventListener('animationend', handler);
      setTimeout(bounce, 600);
    });
  }
  setTimeout(bounce, 1200);
});
</script>
