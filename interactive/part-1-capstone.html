<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Visual Research Atlas: Part I</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Light Theme (Light Editorial) */
      --paper: #f4ede0;
      --paper-2: #ede4d2;
      --paper-3: #e3d7be;
      --ink: #1a1612;
      --ink-2: #443a2e;
      --ink-3: #6e6151;
      --line: #c8b89a;
      --line-2: #d8c8a8;
      --rule: #1a1612;
      --accent: #b8421f;
      --serif: 'Source Serif 4', Georgia, serif;
      --sans: 'IBM Plex Sans', system-ui, sans-serif;
      --mono: 'IBM Plex Mono', monospace;

      /* Atlas specific overrides */
      --timeline-node: #1e293b;
      --timeline-active: #b8421f;
      --timeline-spine: #94a3b8;
      
      --geo-bg: #fef2f2;
      --geo-border: #ef4444;
      --geo-title: #b91c1c;
      
      --trad-bg: #faf5ff;
      --trad-border: #a855f7;
      --trad-title: #7e22ce;
      
      --ev-bg: #ecfdf5;
      --ev-border: #10b981;
      --ev-title: #047857;
    }

    [data-theme="dark"] {
      --paper: #161614;
      --paper-2: #21211e;
      --paper-3: #2d2d2a;
      --ink: #e8e4df;
      --ink-2: #a09b94;
      --ink-3: #78746d;
      --line: #423d38;
      --line-2: #544e48;
      --rule: #e8e4df;
      --accent: #d05833;
      
      --timeline-node: #cbd5e1;
      --timeline-active: #d05833;
      --timeline-spine: #475569;
      
      --geo-bg: rgba(239, 68, 68, 0.08);
      --geo-border: rgba(239, 68, 68, 0.4);
      --geo-title: #fca5a5;
      
      --trad-bg: rgba(168, 85, 247, 0.08);
      --trad-border: rgba(168, 85, 247, 0.4);
      --trad-title: #d8b4fe;
      
      --ev-bg: rgba(16, 185, 129, 0.08);
      --ev-border: rgba(16, 185, 129, 0.4);
      --ev-title: #6ee7b7;
    }

    body {
      margin: 0;
      background: var(--paper);
      font-family: var(--serif);
      color: var(--ink);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #root {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* Left Sidebar: Timeline */
    #timeline-container {
      flex: 0 0 300px;
      height: 100%;
      border-right: 1px solid var(--line);
      position: relative;
      background: var(--paper);
      z-index: 10;
    }

    /* Right Panel: Content */
    #content-panel {
      flex: 1;
      height: 100%;
      overflow-y: auto;
      scroll-behavior: smooth;
      background: var(--paper-2);
      padding: 0;
    }

    .content-inner {
      padding: 60px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* D3 SVG Styles */
    .axis-line { stroke: var(--timeline-spine); stroke-width: 2px; stroke-dasharray: 4 4; transition: all 0.3s ease; }
    .node circle {
      fill: var(--paper);
      stroke: var(--timeline-node);
      stroke-width: 3px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .node text {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1px;
      fill: var(--ink-2);
      cursor: pointer;
      user-select: none;
      transition: all 0.3s ease;
    }
    .node:hover circle {
      fill: var(--paper-3);
      transform: scale(1.1);
    }
    .node.active circle {
      stroke: var(--timeline-active);
      fill: var(--timeline-active);
      transform: scale(1.25);
    }
    .node.active text {
      fill: var(--timeline-active);
      font-weight: 600;
    }

    /* Header & Filters */
    .atlas-header {
      margin-bottom: 60px;
      text-align: center;
    }
    .atlas-eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .atlas-title {
      font-family: var(--serif);
      font-weight: 600;
      font-size: 42px;
      line-height: 1.1;
      letter-spacing: -0.5px;
      color: var(--ink);
      font-variation-settings: 'opsz' 60;
      margin-bottom: 24px;
    }

    .filter-bar {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .filter-pill {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      padding: 8px 16px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--paper);
      color: var(--ink-2);
      cursor: pointer;
      transition: 0.2s;
    }
    .filter-pill:hover { background: var(--paper-3); }
    .filter-pill.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    
    [data-theme="dark"] .filter-pill.active { background: var(--paper); color: var(--ink); border-color: var(--paper); }

    /* Era Cards & Mixed Media Layout */
    .era-section {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 80px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      opacity: 0.5;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      position: relative;
    }
    .era-section.in-view {
      opacity: 1;
      transform: translateY(0);
    }
    .era-section.in-view::before {
      content: '';
      position: absolute;
      top: -1px; left: 0; right: 0;
      height: 4px;
      background: var(--accent);
      border-radius: 8px 8px 0 0;
    }

    .era-date {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--ink-3);
      margin-bottom: 8px;
    }
    .era-title {
      font-family: var(--serif);
      font-weight: 600;
      font-size: 32px;
      line-height: 1.1;
      letter-spacing: -0.4px;
      color: var(--ink);
      font-variation-settings: 'opsz' 60;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    .card-layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 36px;
      align-items: start;
    }

    .visual-panel {
      position: sticky;
      top: 20px;
    }
    .image-block {
      margin-bottom: 24px;
    }
    .visual-panel img {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 10px;
      object-fit: cover;
      border: 1px solid var(--line);
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
    }
    .image-caption {
      font-family: var(--sans);
      font-size: 12px;
      color: var(--ink-3);
      line-height: 1.4;
      text-align: center;
      font-style: italic;
    }

    .text-panel {
      min-width: 0;
    }

    .data-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .data-category {
      padding: 24px;
      border-radius: 6px;
      transition: opacity 0.3s ease;
    }
    .data-category.dimmed { opacity: 0.2; }
    
    .geo { background: var(--geo-bg); border-left: 4px solid var(--geo-border); }
    .trad { background: var(--trad-bg); border-left: 4px solid var(--trad-border); }
    .ev { background: var(--ev-bg); border-left: 4px solid var(--ev-border); }

    .category-title {
      font-family: var(--sans);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .geo .category-title { color: var(--geo-title); }
    .trad .category-title { color: var(--trad-title); }
    .ev .category-title { color: var(--ev-title); }

    .category-subtitle {
      font-family: var(--serif);
      font-weight: 600;
      font-size: 18px;
      line-height: 1.3;
      margin-bottom: 12px;
      color: var(--ink);
    }
    .category-text {
      font-family: var(--serif);
      font-size: 15px;
      line-height: 1.65;
      color: var(--ink-2);
    }
    .category-text p { margin: 0 0 10px 0; }
    .category-text strong { font-weight: 600; color: var(--ink); }
    .category-text ul { padding-left: 20px; margin: 0; }
    .category-text li { margin-bottom: 6px; }

    /* Scrollbar */
    #content-panel {
      scrollbar-width: thin;
      scrollbar-color: var(--line) transparent;
    }
    #content-panel::-webkit-scrollbar { width: 14px; height: 14px; }
    #content-panel::-webkit-scrollbar-track { background: transparent; }
    #content-panel::-webkit-scrollbar-thumb {
      background-color: var(--line);
      border-radius: 10px;
      border: 4px solid var(--paper-2);
      background-clip: padding-box;
    }

    @media (max-width: 960px) {
      .card-layout { grid-template-columns: 1fr; }
      .visual-panel { position: static; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
      .image-block { margin-bottom: 0; }
    }

    @media (max-width: 768px) {
      #root { flex-direction: column; }
      #timeline-container { 
        flex: 0 0 100px; 
        width: 100%; 
        border-right: none; 
        border-bottom: 1px solid var(--line); 
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        z-index: 100;
      }
      .content-inner { padding: 30px 20px; }
      .era-section { padding: 24px; }
      .era-title { font-size: 26px; }
      .atlas-title { font-size: 32px; }
    }
  </style>
  <script>
    // Theme setup
    try {
      const urlParams = new URLSearchParams(window.location.search);
      const urlTheme = urlParams.get('theme');
      if (urlTheme) {
        document.documentElement.setAttribute('data-theme', urlTheme);
      }
      if (window.parent && window.parent.document) {
        let parentTheme = window.parent.document.documentElement.getAttribute('data-theme');
        if (parentTheme && !urlTheme) {
          document.documentElement.setAttribute('data-theme', parentTheme);
        }
        const observer = new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            if (mutation.attributeName === 'data-theme') {
              document.documentElement.setAttribute('data-theme', window.parent.document.documentElement.getAttribute('data-theme'));
            }
          });
        });
        observer.observe(window.parent.document.documentElement, { attributes: ['data-theme'] });
      }
    } catch(e) {}
  </script>
</head>
<body>
  <div id="root">
    <div id="timeline-container"></div>
    <div id="content-panel">
      <div class="content-inner">
        <div class="atlas-header">
          <div class="atlas-eyebrow">Part I Capstone</div>
          <h1 class="atlas-title">Visual Research Atlas</h1>
          <div class="filter-bar">
            <button class="filter-pill active" data-filter="all">Complete View</button>
            <button class="filter-pill" data-filter="geo">Geopolitics & Networks</button>
            <button class="filter-pill" data-filter="trad">Textual Tradition</button>
            <button class="filter-pill" data-filter="ev">Physical Evidence</button>
          </div>
        </div>
        
        <div id="eras-container">
          <!-- Era cards injected here -->
        </div>
      </div>
    </div>
  </div>

  <script>
    const db = [
      {
        id: "era1", date: "1st – 3rd C.",
        title: "The Cosmopolitan Matrix",
        images: [
          { src: "../images/atlas/roman_map.png", caption: "Map: Roman Indian Ocean Alexandrian Vector" },
          { src: "../images/atlas/coin.png", caption: "Artifact: Coin of Gondophares from Taxila" },
          { src: "../images/atlas/muziris.png", caption: "Reconstruction: Port city of Muziris" }
        ],
        geoTitle: "Global Arteries", geo: "Three major arteries connect the world: the Greco-Roman Red Sea route (Alexandrian vector), the Persian-Arab axis, and the overland Silk Road. Greek and Aramaic act as universal commercial passports.",
        tradTitle: "Parthia & The Edessan Anchor", trad: "• Early patristics (Origen, Eusebius) explicitly place Thomas in \"Parthia\" (the Indo-Parthian northwest).<br>• <em>Acts of Judas Thomas</em> (authored in Edessa) establishes the core narrative: an apostolic mission, martyrdom, and the vital <strong>translation of relics</strong> out of India back to the West.",
        evTitle: "1st Century Silence & Tradition", ev: "<strong>NW India:</strong> King Gondophares is archaeologically confirmed (Sirkap, coins). Zero Christian documentation.<br><br><strong>Tamilakam (South India):</strong><br>• <em>East Coast (Coromandel):</em> Puhar is a major port. Zero physical evidence of Christians, but oral and textual traditions consistently point here for the ultimate Tomb.<br>• <em>West Coast (Malabar):</em> Muziris is a booming global pepper port. Zero early Christian documentation."
      },
      {
        id: "era2", date: "4th C.",
        title: "Sasanian Consolidation",
        images: [
          { src: "../images/atlas/era2.png", caption: "Manuscript: 4th-century Syriac text" }
        ],
        geoTitle: "The Persian Curtain", geo: "The Roman Empire shifts center to Constantinople. In the East, Shah Shapur II heavily persecutes the Church of the East in Persia, straining institutional ties but solidifying an independent, Syriac-speaking ecclesiastical identity.",
        tradTitle: "The Relic Divergence", trad: "• Ephrem the Syrian (d. 373) explicitly anchors the relic tradition in the West, attesting the physical bones were brought to Edessa.<br>• The textual relic tradition (bones in the West) and the physical tomb tradition (empty shrine in India) permanently split.",
        evTitle: "Subcontinental Silence", ev: "<strong>East & West Coasts:</strong> The ancient Sangam political order shifts under Kalabhra dominance. The commercial world persists, but no indigenous Christian documentation or artifacts from either Northwest or South India survive. A profound silence."
      },
      {
        id: "era3", date: "5th – 6th C.",
        title: "The Justinian Revival",
        images: [
          { src: "../images/atlas/sasanian_map.png", caption: "Map: Sasanian Maritime Routes" },
          { src: "../images/atlas/era3.png", caption: "Artifact: Granite Pahlavi Cross from Mylapore" }
        ],
        geoTitle: "Byzantine & Aksumite Links", geo: "Direct maritime contact between the Mediterranean and India briefly revives via Aksumite and Byzantine stimulus, before the Sasanian Persians gradually monopolize the Indian Ocean shipping lanes.",
        tradTitle: "South Indian Specificity & \"Calamina\"", trad: "The documentary horizon expands.<br>• Anonymous itineraries (c. 500) introduce the specific toponym \"Kalamene/Calamina.\"<br>• Jacob of Serug details a dark-skinned, sunburnt Indian demographic, physically differentiating the narrative from the Indo-Parthian northwest.",
        evTitle: "Pahlavi Crosses & Cosmas", ev: "<strong>East Coast:</strong> ⚓ 6th-c. Pahlavi cross appears at Mylapore (the oldest known physical artifact). Similar Pahlavi crosses from this Persian network are also found in <strong>Anuradhapura (Sri Lanka)</strong> and <strong>Goa</strong>.<br><br><strong>West Coast:</strong> Alexandrian merchant Cosmas Indicopleustes (c. 550) physically verifies an active Christian community at \"Male\" (pepper coast) and a bishop at Kalyan."
      },
      {
        id: "era4", date: "7th – 9th C.",
        title: "The Network Collapse",
        images: [
          { src: "../images/atlas/kerala_port.png", caption: "Reconstruction: 9th-century Quilon Port" },
          { src: "../images/atlas/era4.png", caption: "Artifact: Tharisapalli Copper Plates (849 CE)" }
        ],
        geoTitle: "Islamic Expansions", geo: "Islamic conquests destroy the Alexandrian vector, severing Latin Europe. The Church of the East survives and expands under the Abbasid Caliphate. Tamilakam undergoes the sweeping Bhakti religious transformation.",
        tradTitle: "Documentary Stagnation", trad: "• The Latin West falls into ignorance, relying on static memory (Anglo-Saxon envoys seek the tomb in 883).<br>• The Syriac world maintains the \"Calamina\" toponym but adds no new geographic detail.",
        evTitle: "The Asymmetrical Dark Age", ev: "<strong>East Coast:</strong> Massive political continuity (Pallavas/Pandyas). Yet, TOTAL DOCUMENTARY SILENCE regarding Christians.<br><br><strong>West Coast:</strong> Out of this silence, the new pluralistic Cēra Perumal state emerges, issuing the <strong>Tharisapalli Copper Plates (849 CE)</strong> at Quilon. This formally embeds Persian Christian merchants (Mar Sapor) into the polity."
      },
      {
        id: "era5", date: "10th – 12th C.",
        title: "European Isolation",
        images: [
          { src: "../images/atlas/era5.png", caption: "Manuscript: Medieval European Prester John depiction" }
        ],
        geoTitle: "The Iron Curtain", geo: "Turkic Seljuk expansions and the subsequent Crusades erect a hard geopolitical curtain between Latin Europe and the East. The Church of the East loses direct overland links to its Indian province.",
        tradTitle: "Prester John & Wandering Relics", trad: "• Cut off from reality, Latin Europe invents the utopian Prester John myth (1145, 1165)—a Christian king guarding the tomb of St. Thomas.<br>• Edessan relics are moved to Chios (post-1144) to escape Islamic warlords (Zengi).",
        evTitle: "The Institutional Chasm", ev: "<strong>West Coast:</strong> The Malabar Christians function seamlessly within the Cēra state's pan-Tamil <em>Manigramam</em> and <em>Añcuvaṇṇam</em> guild structures. They expand as a local commercial elite, completely invisible to the squabbling Mediterranean powers."
      },
      {
        id: "era6", date: "13th – 15th C.",
        title: "Pax Mongolica",
        images: [
          { src: "../images/atlas/era6.png", caption: "Reconstruction: 14th-century Malabar Pepper Garden" }
        ],
        geoTitle: "Malabar Consolidation", geo: "The Mongol Empire forces open trans-Asian transit, creating a superhighway to Ming China. In Kerala, the 1341 Periyar flood destroys Muziris, forcing the commercial hub to consolidate southward at Quilon.",
        tradTitle: "Toponymic Precision", trad: "• Syriac texts finally update: Bar Hebraeus (1286) officially equates Calamina with <strong>Mylapore</strong>.<br>• Authentic Saint Thomas relics reach Ortona, Italy (1258).",
        evTitle: "The Western Convergence", ev: "<strong>East Coast:</strong> A transit hub housing <em>only</em> the Tomb. Latin friars and merchants (Marco Polo, Odoric) pass through Mylapore.<br><br><strong>West Coast:</strong> The living community is entirely concentrated here. John of Marignolli notes them as <em>'masters of the pepper gardens'</em>. Vatican MS 22 (1301) is inscribed at Kodungallur."
      }
    ];

    // Render HTML Cards
    const container = document.getElementById("eras-container");
    container.innerHTML = db.map(era => `
      <div class="era-section" id="section-${era.id}">
        <h2>${era.date}</h2>
        <div class="era-title">${era.title}</div>
        
        <div class="card-layout">
          <div class="visual-panel">
            ${era.images.map(img => `
              <div class="image-block">
                <img src="${img.src}" alt="${img.caption}" loading="lazy">
                <div class="image-caption">${img.caption}</div>
              </div>
            `).join('')}
          </div>
          
          <div class="text-panel">
            <div class="data-grid">
              <div class="data-category geo" data-cat="geo">
                <div class="category-title">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                  Geopolitics & Information Networks
                </div>
                <div class="category-subtitle">${era.geoTitle}</div>
                <div class="category-text">${era.geo}</div>
              </div>
              
              <div class="data-category trad" data-cat="trad">
                <div class="category-title">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                  The Textual & Relic Tradition
                </div>
                <div class="category-subtitle">${era.tradTitle}</div>
                <div class="category-text">${era.trad}</div>
              </div>

              <div class="data-category ev" data-cat="ev">
                <div class="category-title">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                  India: Physical Evidence
                </div>
                <div class="category-subtitle">${era.evTitle}</div>
                <div class="category-text">${era.ev}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `).join('');

    // Filters
    document.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        const filter = e.target.dataset.filter;
        
        document.querySelectorAll('.data-category').forEach(cat => {
          if (filter === 'all' || cat.dataset.cat === filter) {
            cat.classList.remove('dimmed');
          } else {
            cat.classList.add('dimmed');
          }
        });
      });
    });

    // D3 Timeline Setup
    const svg = d3.select("#timeline-container").append("svg")
      .attr("width", "100%")
      .attr("height", "100%");
    
    svg.append("line").attr("class", "axis-line");

    const nodes = svg.selectAll(".node")
      .data(db).enter().append("g")
      .attr("class", "node")
      .attr("id", d => "node-" + d.id)
      .on("click", (event, d) => {
        // Scroll to section
        const el = document.getElementById("section-" + d.id);
        const panel = document.getElementById("content-panel");
        panel.scrollTo({
          top: el.offsetTop - 40,
          behavior: 'smooth'
        });
      });

    nodes.append("circle").attr("r", 8);
    nodes.append("text").text(d => d.date);

    function updateD3Layout() {
      const container = document.getElementById("timeline-container");
      const w = container.clientWidth;
      const h = container.clientHeight;
      const isMobile = window.innerWidth <= 900;

      if (isMobile) {
        const xPad = 40;
        const scale = d3.scalePoint().domain(db.map(d => d.id)).range([xPad, w - xPad]);
        
        d3.select(".axis-line").attr("x1", xPad).attr("y1", h/2 + 5).attr("x2", w - xPad).attr("y2", h/2 + 5);
        d3.selectAll(".node").attr("transform", d => `translate(${scale(d.id)}, ${h/2 + 5})`);
        d3.selectAll(".node text").attr("x", 0).attr("y", -18).attr("text-anchor", "middle");
      } else {
        const yPad = 120;
        const scale = d3.scalePoint().domain(db.map(d => d.id)).range([yPad, h - yPad]);
        
        d3.select(".axis-line").attr("x1", w/2).attr("y1", yPad).attr("x2", w/2).attr("y2", h - yPad);
        d3.selectAll(".node").attr("transform", d => `translate(${w/2}, ${scale(d.id)})`);
        d3.selectAll(".node text").attr("x", 24).attr("y", 4).attr("text-anchor", "start");
      }
    }

    window.addEventListener('resize', updateD3Layout);
    updateD3Layout();

    // Intersection Observer for Scroll Sync
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('in-view');
          
          // Update Timeline
          const id = entry.target.id.replace('section-', '');
          d3.selectAll(".node").classed("active", false);
          d3.select("#node-" + id).classed("active", true);
        }
      });
    }, {
      root: document.getElementById('content-panel'),
      threshold: 0.1,
      rootMargin: "0px 0px -40% 0px"
    });

    document.querySelectorAll('.era-section').forEach(section => observer.observe(section));

  </script>
</body>
</html>
