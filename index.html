<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  
  <!-- Primary Meta Tags -->
  <title>St. Thomas Tradition</title>
  <meta name="title" content="St. Thomas Tradition">
  <meta name="description" content="A rigorous historical analysis of the apostolic era by Gerald Johnson.">
  <meta name="author" content="Gerald Johnson">

  <!-- Open Graph / Social Previews -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="St. Thomas Tradition">
  <meta property="og:description" content="A rigorous historical analysis of the apostolic era by Gerald Johnson, charting the 1st-century mercantile routes from the Mediterranean to the Malabar Coast.">
  
  <meta name="theme-color" content="#FAF6F0">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/reader.css">
</head>
<body>

  <!-- ═══ Reading Progress Bar ═══ -->
  <div id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
    <div id="progress-fill"></div>
  </div>

  <!-- ═══ Top Toolbar ═══ -->
  <header id="toolbar">
    <button id="toc-toggle" aria-label="Open table of contents" title="Table of Contents">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div id="book-title-bar">
      <span id="book-title">St. Thomas Tradition</span>
      <span id="chapter-title-bar"></span>
    </div>

    <div id="toolbar-controls">
      <button id="font-decrease" aria-label="Decrease font size" title="Smaller text">A<sup>−</sup></button>
      <button id="font-increase" aria-label="Increase font size" title="Larger text">A<sup>+</sup></button>
      <button id="theme-toggle" aria-label="Toggle theme" title="Switch theme">
        <svg id="theme-icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="theme-icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ═══ TOC Sidebar ═══ -->
  <div id="toc-overlay"></div>
  <nav id="toc-sidebar" aria-label="Table of Contents">
    <div id="toc-header">
      <h2>Contents</h2>
      <button id="toc-close" aria-label="Close table of contents">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <ul id="toc-list"></ul>
  </nav>

  <!-- ═══ Main Reader ═══ -->
  <main id="reader-content">
    <article id="chapter-content" role="document"></article>

    <nav id="chapter-nav" aria-label="Chapter navigation">
      <button id="prev-chapter" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        <span>Previous</span>
      </button>
      <span id="chapter-indicator">1 / 1</span>
      <button id="next-chapter">
        <span>Next</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </nav>
  </main>

  <!-- ═══ Footnote Popover ═══ -->
  <div id="footnote-popover" role="tooltip" aria-hidden="true">
    <div id="footnote-header">
      <span id="footnote-label">Footnote</span>
      <button id="footnote-close" aria-label="Close footnote">✕</button>
    </div>
    <div id="footnote-body"></div>
  </div>
  <div id="footnote-backdrop"></div>

  <!-- ═══ Interactive Media Modal ═══ -->
  <div id="media-modal" aria-hidden="true">
    <div id="media-modal-header">
      <span id="media-modal-title">Interactive Feature</span>
      <button id="media-modal-close" aria-label="Close interactive feature">✕</button>
    </div>
    <div id="media-modal-content">
      <iframe id="media-modal-iframe" src="" allowfullscreen></iframe>
    </div>
  </div>

  <!-- ═══ Loading Spinner ═══ -->
  <div id="loader" class="hidden">
    <div class="loader-spinner"></div>
    <p>Loading chapter…</p>
  </div>

  <script src="js/reader.js"></script>
</body>
</html>
